services:
  db:
    image: postgres:16
    env_file:
      - .prod.env
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    restart: always

  web:
    build: .
    env_file:
      - .prod.env
    working_dir: /app
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - db
    restart: always

  nginx:
    image: nginx:1.27
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:80"
    depends_on:
      - web
    restart: always

volumes:
  postgres_data_prod:
  static_volume:
  media_volume:
