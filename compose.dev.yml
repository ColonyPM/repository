services:
    db:
        image: postgres:16
        env_file:
            - .dev.env
        volumes:
            - postgres_data_dev:/var/lib/postgresql/data
        ports:
            - "5432:5432"

    web:
        build: .
        env_file:
            - .dev.env
        command: python manage.py runserver 0.0.0.0:8000
        working_dir: /app
        volumes:
            - ./backend:/app
        ports:
            - "8000:8000"
        depends_on:
            - db

    tunnel:
        image: cloudflare/cloudflared:latest
        restart: unless-stopped
        command: tunnel run
        env_file:
            - .dev.env
        depends_on:
            - web

volumes:
    postgres_data_dev:
