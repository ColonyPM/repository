{% extends "base.html" %}
{% load socialaccount %}
{% load static %}

{% block extra_head %}
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
{% endblock %}

{% block navbar %}{% endblock %}

{% block content %}
<div class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="col-12 col-md-6 col-lg-4">
        <div class="card bg-dark text-light border-secondary shadow-sm">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <img
                        src="{% static 'images/colonyPM_darkmode.png' %}"
                        alt="ColonyPM logo"
                        class="mb-3 rounded"
                        style="width: 100px; height: 100px; object-fit: contain; border-radius: 50%!important;"
                    >
                    <h1 class="h4 mb-1">Sign in</h1>

                </div>

                <div class="d-grid gap-3">
                    <!-- Login with GitHub -->
                    <form method="post" action="{% provider_login_url 'github' %}">
                        {% csrf_token %}
                        <button
                            type="submit"
                            class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2 bg-white"
                        >
                            <i class="bi bi-github"></i>
                            <span>Continue with GitHub</span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
