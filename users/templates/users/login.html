{% extends "base.html" %}
{% load static %}
{% block title %}Login{% endblock %}
{% block navbar %}{% endblock %}

{% block page_body %}
<div class="container min-vh-100 d-flex align-items-center justify-content-center">

    <div class="col-12 col-sm-8 col-md-6 col-lg-4">
        <div class="card bg-body-secondary border-0 shadow-lg">
            <div class="card-body p-4">

                <!-- Circular avatar + title -->
                <div class="text-center mb-3">
                    <div class="d-inline-block rounded-circle overflow-hidden bg-body-tertiary"
                         style="width: 140px; height: 140px;">
                        <img src="{% static 'images/colonyPM.jpg' %}"
                             alt="ColonyPM logo"
                             class="w-100 h-100 object-fit-cover">
                    </div>
                </div>


                <!-- Error message -->
                {% if form.errors %}
                    <div class="alert bg-danger bg-opacity-60 text-white py-2 mb-3" role="alert">
                        Invalid username or password.
                    </div>
                {% endif %}

                <!-- Form -->
                <form method="post" novalidate>
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="{{ form.username.id_for_label }}" class="form-label">
                            {{ form.username.label }}
                        </label>
                        <input
                            type="text"
                            name="{{ form.username.html_name }}"
                            id="{{ form.username.id_for_label }}"
                            value="{{ form.username.value|default_if_none:'' }}"
                            class="form-control"
                            placeholder="Enter username"
                        >
                    </div>

                    <div class="mb-3">
                        <label for="{{ form.password.id_for_label }}" class="form-label">
                            {{ form.password.label }}
                        </label>
                        <input
                            type="password"
                            name="{{ form.password.html_name }}"
                            id="{{ form.password.id_for_label }}"
                            class="form-control"
                            placeholder="Enter password"
                        >
                    </div>

                    <button type="submit" class="btn btn-light text-dark w-100 mb-3">
                        Sign In
                    </button>

                    <div class="text-center">
                        <a href="{% url 'register' %}" class="link-light text-decoration-none">
                            Create Account
                        </a>
                    </div>
                </form>

            </div>
        </div>
    </div>

</div>
{% endblock page_body %}
