upstream django_app {
    # Gunicorn in the "web" container
    server web:8000;
}

server {
    listen 80;
    server_name _;

    # Optional: favicon special-case
    location = /favicon.ico { access_log off; log_not_found off; }

    # Serve static files collected by Django (admin CSS/JS included)
    location /static/ {
        # STATIC_ROOT inside the containers is /app/staticfiles
        alias /app/staticfiles/;
        access_log off;
        expires 30d;
    }

    # Serve uploaded media files
    location /media/ {
        alias /app/media/;
        access_log off;
    }

    # All other requests go to Django via Gunicorn
    location / {
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
